# Sync from upstream (sveltia/sveltia-cms-auth) daily and deploy to Cloudflare Workers
name: Sync & Deploy

on:
  # Deploy on every push to main (including sync merges)
  push:
    branches: [main]
  # Daily sync from upstream
  schedule:
    - cron: '30 5 * * *' # 5:30 UTC = 6:30/7:30 CET/CEST
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    # Only sync on schedule or manual trigger, not on push
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/sveltia/sveltia-cms-auth.git
          git fetch upstream main
          # Fast-forward merge — if it fails (diverged history), stop and don't break anything
          git merge upstream/main --ff-only
          git push origin main

  deploy:
    # Deploy on push, or after successful sync
    needs: [sync]
    # Allow deploy to run even if sync was skipped (push event)
    if: always() && (github.event_name == 'push' || needs.sync.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
